on:
  push:
    branches: ["main"] # Trigger on push to main branch
    paths:
      - "packages/react-app/**" # Only trigger for changes in this folder
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read # To checkout code
  pages: write # To deploy to Pages
  id-token: write # To verify deployment source

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Build React App
        run: pnpm --filter react-app build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./packages/react-app/dist" # Path to your static files (e.g., './dist' for frameworks)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
